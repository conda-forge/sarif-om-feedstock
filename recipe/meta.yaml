{% set name = "sarif-om" %}
{% set version = "1.0.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sarif_om-{{ version }}.tar.gz
  sha256: cd5f416b3083e00d402a92e449a7ff67af46f11241073eea0461802a3b5aef98

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pbr
    - pip
  run:
    - python >={{ python_min }}
    - attrs
    - pbr

test:
  imports:
    - sarif_om
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/microsoft/sarif-python-om
  summary: Classes implementing the SARIF 2.1.0 object model.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
